<!DOCTYPE html>
<html>
<head>

<title>AI Support Ticket Classifier</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    width:450px;
    padding:40px;
    border-radius:15px;
    box-shadow:0px 10px 30px rgba(0,0,0,0.3);
    text-align:center;
}

h1{
    margin-bottom:20px;
    color:#333;
}

textarea{
    width:100%;
    height:120px;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:15px;
}

button{
    margin-top:15px;
    width:100%;
    padding:12px;
    background:#4CAF50;
    color:white;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#45a049;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#f4f4f4;
    border-radius:10px;
}

.category{
    color:#0077ff;
    font-weight:bold;
}

.priority{
    color:#ff4b5c;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Support Ticket Classifier</h1>

<form method="POST">

<textarea name="ticket" placeholder="Enter customer support ticket..."></textarea>

<button type="submit">Predict Ticket</button>

</form>

{% if category %}

<div class="result">

<p>Category: <span class="category">{{category}}</span></p>

<p>Priority: <span class="priority">{{priority}}</span></p>

</div>

{% endif %}

</div>

</body>

</html>
